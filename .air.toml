# .air.toml

root = "."
tmp_dir = "tmp"
testdata_dir = "testdata"

[build]
  cmd = "make build"
  bin = "bin/repo-reviewer"
  full_bin = ""
  include_dir = []
  include_file = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  delay = 1000
  log = "build-errors.log"
  stop_on_error = true
  poll = false
  poll_interval = 0

[log]
  time = false
  main_only = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exist = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true